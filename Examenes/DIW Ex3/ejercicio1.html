<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 1 - Contraseñas</title>
  <!-- Hoja de estilos de Bootstrap 5.3.3 cargada desde CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">

  <!-- Contenedor centrado con ancho máximo de 500px -->
  <div class="container py-5" style="max-width: 500px;">
    <h2 class="mb-4">Ejercicio 1 - Contraseñas</h2>

    <!-- Tarjeta que contiene el formulario de acceso -->
    <div class="card p-4 shadow-sm">
      <p class="mb-3">Introduce la contraseña para acceder al sistema:</p>

      <!-- Campo de texto tipo password -->
      <div class="mb-3">
        <input type="password" id="inputClave" class="form-control" placeholder="Contraseña">
      </div>
      <!-- Botón que llama a la función comprobarClave() -->
      <button class="btn btn-primary w-100" onclick="comprobarClave()">Entrar</button>

      <!-- Div vacío donde se mostrará el mensaje de éxito, error o bloqueo -->
      <div id="mensaje" class="mt-3"></div>
    </div>

    <!-- Enlace para volver a la página principal -->
    <div class="mt-4">
      <a href="index.html" class="btn btn-secondary">Volver al inicio</a>
    </div>
  </div>

  <!-- Script del ejercicio 1 -->
  <script src="script1.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
