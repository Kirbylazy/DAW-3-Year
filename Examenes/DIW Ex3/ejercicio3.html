<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 3 - Facturación</title>
  <!-- Hoja de estilos de Bootstrap 5.3.3 cargada desde CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">

  <!-- Contenedor centrado con ancho máximo de 500px -->
  <div class="container py-5" style="max-width: 500px;">
    <h2 class="mb-4">Ejercicio 3 - Facturación</h2>

    <!-- Tarjeta que contiene el formulario de facturación -->
    <div class="card p-4 shadow-sm">
      <!-- Campo numérico para introducir el importe del producto -->
      <div class="mb-3">
        <label for="inputImporte" class="form-label">Importe del producto (€):</label>
        <input type="number" id="inputImporte" class="form-control" placeholder="Importe" min="0" step="0.01">
      </div>

      <!-- Select para elegir el medio de pago: C=crédito, E=efectivo, D=débito -->
      <div class="mb-3">
        <label for="selectPago" class="form-label">Medio de pago:</label>
        <select id="selectPago" class="form-select">
          <option value="C">C - Tarjeta de crédito</option>
          <option value="E">E - Efectivo</option>
          <option value="D">D - Tarjeta de débito</option>
        </select>
      </div>

      <!-- Botón que llama a calcularFactura() -->
      <button class="btn btn-primary w-100" onclick="calcularFactura()">Calcular</button>

      <!-- Div vacío donde se mostrará el resultado -->
      <div id="resultadoFactura" class="mt-3"></div>
    </div>

    <!-- Enlace para volver a la página principal -->
    <div class="mt-4">
      <a href="index.html" class="btn btn-secondary">Volver al inicio</a>
    </div>
  </div>

  <!-- Script del ejercicio 3 -->
  <script src="script3.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
