<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 5 - Lanzamiento de dados</title>
  <!-- Hoja de estilos de Bootstrap 5.3.3 cargada desde CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">

  <!-- Contenedor centrado con ancho máximo de 500px -->
  <div class="container py-5" style="max-width: 500px;">
    <h2 class="mb-4">Ejercicio 5 - Lanzamiento de dados</h2>

    <!-- Tarjeta centrada que muestra el dado y el botón -->
    <div class="card p-4 shadow-sm text-center">
      <!-- Imagen del dado -->
      <div id="iconoDado">
        <img src="images/dado.png" alt="Dado" style="height: 100px;">
      </div>
      <!-- Mensaje de resultado -->
      <p id="mensajeDado" class="mt-3 fs-5 text-muted">Pulsa el botón para tirar los dados</p>
      <!-- Botón con onclick="tirarDados()" -->
      <button class="btn btn-primary mt-2" onclick="tirarDados()">Tirar dados</button>
    </div>

    <!-- Enlace para volver a la página principal -->
    <div class="mt-4">
      <a href="index.html" class="btn btn-secondary">Volver al inicio</a>
    </div>
  </div>

  <!-- Script del ejercicio 5 -->
  <script src="script5.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
