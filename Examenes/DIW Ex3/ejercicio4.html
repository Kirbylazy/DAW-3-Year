<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 4 - Formulario</title>
  <!-- Hoja de estilos de Bootstrap 5.3.3 cargada desde CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">

  <!-- Contenedor centrado con ancho máximo de 600px -->
  <div class="container py-5" style="max-width: 600px;">
    <h2 class="mb-4">Ejercicio 4 - Formulario</h2>

    <!-- Tarjeta que contiene el formulario y el resultado -->
    <div class="card p-4 shadow-sm">
      <!-- Fila con los 3 inputs y el botón en línea -->
      <div class="row g-2 mb-3">
        <!-- Input para el nombre de usuario -->
        <div class="col">
          <input type="text" id="inputUsuario" class="form-control" placeholder="Usuario">
        </div>
        <!-- Input para el nombre completo -->
        <div class="col">
          <input type="text" id="inputNombre" class="form-control" placeholder="Nombre">
        </div>
        <!-- Input para el correo electrónico -->
        <div class="col">
          <input type="email" id="inputCorreo" class="form-control" placeholder="Correo">
        </div>
        <!-- Botón que llama a mostrarDatos() -->
        <div class="col-auto">
          <button class="btn btn-primary" onclick="mostrarDatos()">Enviar</button>
        </div>
      </div>

      <!-- Div vacío donde se mostrarán los datos introducidos por el usuario -->
      <div id="resultadoFormulario"></div>
    </div>

    <!-- Enlace para volver a la página principal -->
    <div class="mt-4">
      <a href="index.html" class="btn btn-secondary">Volver al inicio</a>
    </div>
  </div>

  <!-- Script del ejercicio 4 -->
  <script src="script4.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
