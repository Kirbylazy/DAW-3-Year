<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 2 - Tabla de Multiplicar</title>
  <!-- Hoja de estilos de Bootstrap 5.3.3 cargada desde CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">

  <!-- Contenedor centrado con ancho máximo de 500px -->
  <div class="container py-5" style="max-width: 500px;">
    <h2 class="mb-4">Ejercicio 2 - Tabla de Multiplicar</h2>

    <!-- Tarjeta que contiene el formulario y el resultado -->
    <div class="card p-4 shadow-sm">
      <!-- Input numérico donde el usuario escribe el número a multiplicar -->
      <div class="mb-3">
        <label for="inputNumero" class="form-label">Introduce un número:</label>
        <input type="number" id="inputNumero" class="form-control" placeholder="Número">
      </div>
      <!-- Botón que llama a la función mostrarTabla() -->
      <button class="btn btn-primary w-100" onclick="mostrarTabla()">Generar tabla</button>

      <!-- Div vacío donde se insertará la tabla de multiplicar generada -->
      <div id="resultado" class="mt-4 font-monospace"></div>
    </div>

    <!-- Enlace para volver a la página principal -->
    <div class="mt-4">
      <a href="index.html" class="btn btn-secondary">Volver al inicio</a>
    </div>
  </div>

  <!-- Script del ejercicio 2 -->
  <script src="script2.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
